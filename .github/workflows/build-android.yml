name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Make Gradle executable
        working-directory: Android
        run: chmod +x gradlew

      - name: Clean project
        working-directory: Android
        run: ./gradlew clean

      - name: Build Debug APK
        working-directory: Android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Android/app/build/outputs/apk/debug/        run: ./gradlew clean

      - name: Build Debug APK
        working-directory: Android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Android/app/build/outputs/apk/debug/*.apk        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
