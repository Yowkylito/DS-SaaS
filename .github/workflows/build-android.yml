name: Android Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java (required for Android Gradle Plugin 8+)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Android SDK safely
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Inspect project structure (debug safety)
      - name: Debug project structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== ANDROID ==="
          ls -R android || true

      # 5. Fix Gradle wrapper permissions if it exists
      - name: Make Gradle executable (if exists)
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi

      # 6. Validate Gradle environment (prevents silent failures)
      - name: Validate Gradle setup
        working-directory: android
        run: |
          echo "Checking Gradle files..."
          test -f settings.gradle.kts || echo "WARNING: missing settings.gradle.kts"
          test -f build.gradle.kts || echo "WARNING: missing root build.gradle.kts"
          test -f app/build.gradle.kts || echo "WARNING: missing app build.gradle.kts"

      # 7. Build APK (SAFE MODE with fallback)
      - name: Build APK (safe mode)
        working-directory: android
        run: |
          set -e

          echo "Starting build..."

          if [ -f ./gradlew ]; then
            echo "Using Gradle Wrapper"
            ./gradlew assembleDebug --stacktrace --no-daemon
          else
            echo "Gradle Wrapper missing → using system gradle"
            gradle assembleDebug --stacktrace
          fi

      # 8. Upload APK artifact
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk            ./gradlew assembleDebug --stacktrace
          else
            gradle assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
