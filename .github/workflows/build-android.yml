name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: 17
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup Java
      # -----------------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # -----------------------------
      # 3. Install Android SDK (manual, stable)
      # -----------------------------
      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT

          wget https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
          unzip commandlinetools-linux-12266719_latest.zip -d cmdline-tools

          mv cmdline-tools/cmdline-tools cmdline-tools/latest

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      # -----------------------------
      # 4. Accept licenses (NON-INTERACTIVE FIX)
      # -----------------------------
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      # -----------------------------
      # 5. Install required SDK packages
      # -----------------------------
      - name: Install SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # -----------------------------
      # 6. Grant execute permission to gradlew
      # -----------------------------
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # -----------------------------
      # 7. Build Debug APK
      # -----------------------------
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # -----------------------------
      # 8. Upload APK artifact
      # -----------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Build Release APK (unsigned)
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Print Build Status
        run: |
          echo "✅ Build Status: SUCCESS"
          echo "📦 APK files ready for download in Artifacts"
